<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 280" role="img" aria-label="TDA for time series: a wavy series with a persistence barcode underneath"><rect data-bg="paper" width="100%" height="100%" fill="#f5efde" />
  <defs><style>
    .ink         { stroke: #2b211a; fill: none; stroke-width: 1.4; stroke-linecap: round; stroke-linejoin: round; }
    .hair        { stroke: #2b211a; fill: none; stroke-width: 0.5; opacity: 0.4; }
    .axis        { stroke: #2b211a; fill: none; stroke-width: 0.7; opacity: 0.45; }
    .bar         { stroke: #2b211a; fill: none; stroke-width: 3; stroke-linecap: butt; }
    .bar-thin    { stroke: #2b211a; fill: none; stroke-width: 1.4; stroke-linecap: butt; opacity: 0.65; }
    .frame       { stroke: #2b211a; fill: none; stroke-width: 0.6; opacity: 0.4; }
    .panel-label { font-family: 'EB Garamond', Georgia, serif; font-style: italic; font-size: 16px; fill: #2b211a; opacity: 0.75; letter-spacing: 0.05em; }
  </style></defs>
  <rect class="frame" x="6"  y="6"  width="268" height="268" stroke-width="1.4" opacity="0.6" />
  <rect class="frame" x="11" y="11" width="258" height="258" stroke-width="0.5" opacity="0.4" />

  <!-- top half: time series curve -->
  <line class="axis" x1="40"  y1="125" x2="240" y2="125" />
  <path class="ink" d="M 40 95 Q 55 50 75 90 Q 95 130 115 85 Q 135 45 155 95 Q 175 145 195 100 Q 210 70 240 115" />

  <!-- regime change marker (vertical hair line) -->
  <line class="hair" x1="155" y1="30" x2="155" y2="125" />

  <!-- bottom half: persistence barcode -->
  <line class="axis" x1="40"  y1="248" x2="240" y2="248" />
  <line class="bar"      x1="50"  y1="165" x2="220" y2="165" />
  <line class="bar"      x1="60"  y1="183" x2="170" y2="183" />
  <line class="bar-thin" x1="70"  y1="199" x2="120" y2="199" />
  <line class="bar-thin" x1="90"  y1="213" x2="135" y2="213" />
  <line class="bar-thin" x1="110" y1="227" x2="140" y2="227" />
  <line class="bar-thin" x1="80"  y1="241" x2="100" y2="241" />

  <text class="panel-label" x="20"  y="264">SERIES · ATTRACTOR · BARCODE</text>
  <text class="panel-label" x="260" y="264" text-anchor="end">Plate V</text>
</svg>
