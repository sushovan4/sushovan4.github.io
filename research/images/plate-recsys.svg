<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 280" role="img" aria-label="Recommender systems: a bipartite user–item graph"><rect data-bg="paper" width="100%" height="100%" fill="#f5efde" />
  <defs><style>
    .ink         { stroke: #2b211a; fill: none; stroke-width: 1.2; stroke-linecap: round; stroke-linejoin: round; }
    .hair        { stroke: #2b211a; fill: none; stroke-width: 0.6; opacity: 0.4; stroke-dasharray: 2 2; }
    .vertex      { fill: #2b211a; stroke: none; }
    .item        { fill: none; stroke: #2b211a; stroke-width: 1.4; }
    .label       { font-family: 'EB Garamond', Georgia, serif; font-style: italic; font-size: 11px; fill: #2b211a; opacity: 0.6; }
    .frame       { stroke: #2b211a; fill: none; stroke-width: 0.6; opacity: 0.4; }
    .panel-label { font-family: 'EB Garamond', Georgia, serif; font-style: italic; font-size: 16px; fill: #2b211a; opacity: 0.75; letter-spacing: 0.05em; }
  </style></defs>
  <rect class="frame" x="6"  y="6"  width="268" height="268" stroke-width="1.4" opacity="0.6" />
  <rect class="frame" x="11" y="11" width="258" height="258" stroke-width="0.5" opacity="0.4" />

  <!-- column labels -->
  <text class="label" x="80"  y="42" text-anchor="middle">users</text>
  <text class="label" x="200" y="42" text-anchor="middle">items</text>

  <!-- user nodes (filled circles) on the left -->
  <g class="vertex">
    <circle cx="80" cy="68"  r="6" />
    <circle cx="80" cy="108" r="6" />
    <circle cx="80" cy="148" r="6" />
    <circle cx="80" cy="188" r="6" />
    <circle cx="80" cy="226" r="6" />
  </g>

  <!-- item nodes (open rings) on the right -->
  <g class="item">
    <circle cx="200" cy="68"  r="6" />
    <circle cx="200" cy="108" r="6" />
    <circle cx="200" cy="148" r="6" />
    <circle cx="200" cy="188" r="6" />
    <circle cx="200" cy="226" r="6" />
  </g>

  <!-- bipartite edges (preferences/ratings) -->
  <g class="ink">
    <line x1="80" y1="68"  x2="200" y2="68"  />
    <line x1="80" y1="68"  x2="200" y2="148" />
    <line x1="80" y1="108" x2="200" y2="68"  />
    <line x1="80" y1="108" x2="200" y2="108" />
    <line x1="80" y1="108" x2="200" y2="188" />
    <line x1="80" y1="148" x2="200" y2="108" />
    <line x1="80" y1="148" x2="200" y2="148" />
    <line x1="80" y1="148" x2="200" y2="226" />
    <line x1="80" y1="188" x2="200" y2="108" />
    <line x1="80" y1="188" x2="200" y2="188" />
    <line x1="80" y1="226" x2="200" y2="148" />
    <line x1="80" y1="226" x2="200" y2="188" />
    <line x1="80" y1="226" x2="200" y2="226" />
  </g>

  <!-- a few faint potential edges (recommended items) -->
  <g class="hair">
    <line x1="80" y1="68"  x2="200" y2="188" />
    <line x1="80" y1="148" x2="200" y2="68"  />
    <line x1="80" y1="188" x2="200" y2="226" />
  </g>

  <text class="panel-label" x="20"  y="264">USER · ITEM · BIPARTITE</text>
  <text class="panel-label" x="260" y="264" text-anchor="end">Plate VII</text>
</svg>
