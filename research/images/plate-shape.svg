<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 280" role="img" aria-label="Shape reconstruction: finite samples on a curve, with VR edges"><rect data-bg="paper" width="100%" height="100%" fill="#f5efde" />
  <defs><style>
    .ink         { stroke: #2b211a; fill: none; stroke-width: 1.2; stroke-linecap: round; stroke-linejoin: round; }
    .hair        { stroke: #2b211a; fill: none; stroke-width: 0.6; stroke-dasharray: 2 2; opacity: 0.55; }
    .vertex      { fill: #2b211a; stroke: none; }
    .frame       { stroke: #2b211a; fill: none; stroke-width: 0.6; opacity: 0.4; }
    .panel-label { font-family: 'EB Garamond', Georgia, serif; font-style: italic; font-size: 16px; fill: #2b211a; opacity: 0.75; letter-spacing: 0.05em; }
  </style></defs>
  <rect class="frame" x="6"  y="6"  width="268" height="268" stroke-width="1.4" opacity="0.6" />
  <rect class="frame" x="11" y="11" width="258" height="258" stroke-width="0.5" opacity="0.4" />

  <!-- the underlying curve (manifold), drawn faintly -->
  <path class="hair" d="M 60 90 C 100 50, 180 50, 220 90 C 250 130, 200 180, 160 170 C 110 158, 80 200, 60 230 C 50 220, 40 180, 60 140 C 70 110, 60 90, 60 90 Z" fill="none" />
  <!-- VR edges connecting nearby samples -->
  <g class="ink">
    <line x1="80"  y1="78"  x2="120" y2="58" />
    <line x1="120" y1="58"  x2="160" y2="55" />
    <line x1="160" y1="55"  x2="200" y2="68" />
    <line x1="200" y1="68"  x2="225" y2="98" />
    <line x1="225" y1="98"  x2="220" y2="130" />
    <line x1="220" y1="130" x2="195" y2="158" />
    <line x1="195" y1="158" x2="165" y2="172" />
    <line x1="165" y1="172" x2="135" y2="170" />
    <line x1="135" y1="170" x2="100" y2="195" />
    <line x1="100" y1="195" x2="75"  y2="218" />
    <line x1="75"  y1="218" x2="58"  y2="195" />
    <line x1="58"  y1="195" x2="48"  y2="155" />
    <line x1="48"  y1="155" x2="58"  y2="115" />
    <line x1="58"  y1="115" x2="80"  y2="78"  />
  </g>
  <!-- finite sample points -->
  <g class="vertex">
    <circle cx="80"  cy="78"  r="4" />
    <circle cx="120" cy="58"  r="4" />
    <circle cx="160" cy="55"  r="4" />
    <circle cx="200" cy="68"  r="4" />
    <circle cx="225" cy="98"  r="4" />
    <circle cx="220" cy="130" r="4" />
    <circle cx="195" cy="158" r="4" />
    <circle cx="165" cy="172" r="4" />
    <circle cx="135" cy="170" r="4" />
    <circle cx="100" cy="195" r="4" />
    <circle cx="75"  cy="218" r="4" />
    <circle cx="58"  cy="195" r="4" />
    <circle cx="48"  cy="155" r="4" />
    <circle cx="58"  cy="115" r="4" />
  </g>

  <text class="panel-label" x="20"  y="264">SAMPLE · VR · LATSCHEV</text>
  <text class="panel-label" x="260" y="264" text-anchor="end">Plate IV</text>
</svg>
