<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 280" role="img" aria-label="Topological kernels: two classes separated by a hyperplane"><rect data-bg="paper" width="100%" height="100%" fill="#f5efde" />
  <defs><style>
    .vertex      { fill: #2b211a; stroke: none; }
    .vertex-open { fill: none; stroke: #2b211a; stroke-width: 1.4; }
    .hyperplane  { stroke: #2b211a; fill: none; stroke-width: 1.4; opacity: 0.85; }
    .frame       { stroke: #2b211a; fill: none; stroke-width: 0.6; opacity: 0.4; }
    .panel-label { font-family: 'EB Garamond', Georgia, serif; font-style: italic; font-size: 16px; fill: #2b211a; opacity: 0.75; letter-spacing: 0.05em; }
  </style></defs>
  <rect class="frame" x="6"  y="6"  width="268" height="268" stroke-width="1.4" opacity="0.6" />
  <rect class="frame" x="11" y="11" width="258" height="258" stroke-width="0.5" opacity="0.4" />

  <line class="hyperplane" x1="55" y1="220" x2="225" y2="55" />
  <g class="vertex">
    <circle cx="80"  cy="80"  r="5" />
    <circle cx="105" cy="95"  r="5" />
    <circle cx="78"  cy="115" r="5" />
    <circle cx="125" cy="65"  r="5" />
    <circle cx="135" cy="100" r="5" />
    <circle cx="60"  cy="140" r="5" />
    <circle cx="155" cy="80"  r="5" />
    <circle cx="100" cy="135" r="5" />
  </g>
  <g class="vertex-open">
    <circle cx="160" cy="180" r="5" />
    <circle cx="190" cy="160" r="5" />
    <circle cx="200" cy="195" r="5" />
    <circle cx="220" cy="175" r="5" />
    <circle cx="180" cy="215" r="5" />
    <circle cx="140" cy="195" r="5" />
    <circle cx="220" cy="210" r="5" />
    <circle cx="155" cy="215" r="5" />
  </g>

  <text class="panel-label" x="20"  y="264">POINT CLOUD · LANDMARK · KERNEL</text>
  <text class="panel-label" x="260" y="264" text-anchor="end">Plate VI</text>
</svg>
