<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 280" role="img" aria-label="Gromov–Hausdorff distance: two metric spaces with a bridge"><rect data-bg="paper" width="100%" height="100%" fill="#f5efde" />
  <defs><style>
    .ink         { stroke: #2b211a; fill: none; stroke-width: 1.2; stroke-linecap: round; stroke-linejoin: round; }
    .hair        { stroke: #2b211a; fill: none; stroke-width: 0.6; opacity: 0.55; stroke-dasharray: 3 3; }
    .vertex      { fill: #2b211a; stroke: none; }
    .label-math  { font-family: 'EB Garamond', Georgia, serif; font-style: italic; font-size: 24px; fill: #2b211a; opacity: 0.9; }
    .small-label { font-family: 'EB Garamond', Georgia, serif; font-style: italic; font-size: 18px; fill: #2b211a; opacity: 0.7; }
    .frame       { stroke: #2b211a; fill: none; stroke-width: 0.6; opacity: 0.4; }
    .panel-label { font-family: 'EB Garamond', Georgia, serif; font-style: italic; font-size: 16px; fill: #2b211a; opacity: 0.75; letter-spacing: 0.05em; }
  </style></defs>
  <rect class="frame" x="6"  y="6"  width="268" height="268" stroke-width="1.4" opacity="0.6" />
  <rect class="frame" x="11" y="11" width="258" height="258" stroke-width="0.5" opacity="0.4" />

  <!-- Left space: a circle (X) -->
  <circle class="ink" cx="75" cy="140" r="42" />
  <g class="vertex">
    <circle cx="117" cy="140" r="3.5" />
    <circle cx="105" cy="170" r="3.5" />
    <circle cx="75"  cy="182" r="3.5" />
    <circle cx="45"  cy="170" r="3.5" />
    <circle cx="33"  cy="140" r="3.5" />
    <circle cx="45"  cy="110" r="3.5" />
    <circle cx="75"  cy="98"  r="3.5" />
    <circle cx="105" cy="110" r="3.5" />
  </g>
  <text class="small-label" x="75" y="218" text-anchor="middle">X</text>

  <!-- Right space: an ellipse (Y) -->
  <ellipse class="ink" cx="205" cy="140" rx="48" ry="34" />
  <g class="vertex">
    <circle cx="253" cy="140" r="3.5" />
    <circle cx="235" cy="167" r="3.5" />
    <circle cx="205" cy="174" r="3.5" />
    <circle cx="175" cy="167" r="3.5" />
    <circle cx="157" cy="140" r="3.5" />
    <circle cx="175" cy="113" r="3.5" />
    <circle cx="205" cy="106" r="3.5" />
    <circle cx="235" cy="113" r="3.5" />
  </g>
  <text class="small-label" x="205" y="218" text-anchor="middle">Y</text>

  <!-- Correspondence/bridge between the two spaces -->
  <g class="hair">
    <line x1="117" y1="140" x2="157" y2="140" />
    <line x1="105" y1="170" x2="175" y2="167" />
    <line x1="105" y1="110" x2="175" y2="113" />
  </g>

  <!-- distance label -->
  <text class="label-math" x="140" y="60" text-anchor="middle">d&#8202;<tspan font-size="14" baseline-shift="-2">GH</tspan>(X, Y)</text>

  <text class="panel-label" x="20"  y="264">METRIC · CORRESPONDENCE · BRIDGE</text>
  <text class="panel-label" x="260" y="264" text-anchor="end">Plate III</text>
</svg>
