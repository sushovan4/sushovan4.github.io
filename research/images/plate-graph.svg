<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 280" role="img" aria-label="Geometric graph reconstruction: a network recovered from sampled points">
  <defs><style>
    .ink { stroke: currentColor; fill: none; stroke-width: 1.4; stroke-linecap: round; stroke-linejoin: round; }
    .hair { fill: currentColor; opacity: 0.18; }
    .vertex { fill: currentColor; stroke: none; }
  </style></defs>
  <!-- noisy sample cloud (faint dots) around an underlying graph structure -->
  <g class="hair">
    <circle cx="60"  cy="55"  r="2" /><circle cx="80"  cy="62"  r="2" /><circle cx="68"  cy="78"  r="2" />
    <circle cx="92"  cy="85"  r="2" /><circle cx="110" cy="68"  r="2" /><circle cx="125" cy="90"  r="2" />
    <circle cx="140" cy="80"  r="2" /><circle cx="155" cy="100" r="2" /><circle cx="172" cy="78"  r="2" />
    <circle cx="190" cy="95"  r="2" /><circle cx="210" cy="80"  r="2" /><circle cx="225" cy="105" r="2" />
    <circle cx="135" cy="120" r="2" /><circle cx="148" cy="138" r="2" /><circle cx="162" cy="155" r="2" />
    <circle cx="155" cy="175" r="2" /><circle cx="170" cy="195" r="2" /><circle cx="185" cy="215" r="2" />
    <circle cx="145" cy="200" r="2" /><circle cx="130" cy="220" r="2" />
    <circle cx="100" cy="170" r="2" /><circle cx="85"  cy="195" r="2" /><circle cx="65"  cy="218" r="2" />
    <circle cx="118" cy="148" r="2" /><circle cx="115" cy="180" r="2" /><circle cx="58"  cy="180" r="2" />
  </g>
  <!-- recovered graph edges -->
  <g class="ink">
    <line x1="70"  y1="68"  x2="100" y2="78"  />
    <line x1="100" y1="78"  x2="135" y2="85"  />
    <line x1="135" y1="85"  x2="170" y2="90"  />
    <line x1="170" y1="90"  x2="210" y2="95"  />
    <line x1="135" y1="85"  x2="145" y2="135" />
    <line x1="145" y1="135" x2="170" y2="180" />
    <line x1="170" y1="180" x2="180" y2="220" />
    <line x1="145" y1="135" x2="125" y2="170" />
    <line x1="125" y1="170" x2="100" y2="200" />
    <line x1="100" y1="200" x2="75"  y2="220" />
    <line x1="100" y1="200" x2="65"  y2="190" />
  </g>
  <!-- recovered graph nodes -->
  <g class="vertex">
    <circle cx="70"  cy="68"  r="4" />
    <circle cx="100" cy="78"  r="4" />
    <circle cx="135" cy="85"  r="4" />
    <circle cx="170" cy="90"  r="4" />
    <circle cx="210" cy="95"  r="4" />
    <circle cx="145" cy="135" r="4" />
    <circle cx="125" cy="170" r="4" />
    <circle cx="170" cy="180" r="4" />
    <circle cx="100" cy="200" r="4" />
    <circle cx="180" cy="220" r="4" />
    <circle cx="75"  cy="220" r="4" />
    <circle cx="65"  cy="190" r="4" />
  </g>
</svg>
