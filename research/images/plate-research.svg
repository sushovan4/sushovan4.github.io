<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 280" role="img" aria-label="Frontispiece: the Vietoris–Rips reconstruction of a finite sample drawn from a closed curve" style="color: #2b211a">
  <rect data-bg="paper" width="100%" height="100%" fill="#f5efde" />
  <defs>
    <style>
      .ink         { stroke: #2b211a; fill: none; stroke-width: 0.9; stroke-linecap: round; stroke-linejoin: round; }
      .curve       { stroke: #2b211a; fill: none; stroke-width: 1.4; opacity: 0.75; stroke-linecap: round; }
      .hair        { stroke: #2b211a; fill: none; stroke-width: 0.5; stroke-dasharray: 3 3; opacity: 0.55; }
      .vertex      { fill: #2b211a; }
      .triangle    { fill: #2b211a; opacity: 0.10; stroke: #2b211a; stroke-width: 0.7; stroke-linejoin: round; }
      .frame       { stroke: #2b211a; fill: none; stroke-width: 0.6; opacity: 0.4; }
      .label       { font-family: 'EB Garamond', Georgia, serif; font-style: italic; font-size: 14px; fill: #2b211a; opacity: 0.85; }
      .label-small { font-family: 'EB Garamond', Georgia, serif; font-style: italic; font-size: 11px; fill: #2b211a; opacity: 0.7; }
      .panel-label { font-family: 'EB Garamond', Georgia, serif; font-style: italic; font-size: 10px; fill: #2b211a; opacity: 0.6; letter-spacing: 0.08em; }
    </style>
  </defs>

  <!-- double-rule frame, in the manner of an engraved plate -->
  <rect class="frame" x="6"  y="6"  width="788" height="268" stroke-width="1.4" opacity="0.6" />
  <rect class="frame" x="11" y="11" width="778" height="258" stroke-width="0.5" opacity="0.4" />

  <!-- THE MANIFOLD M — a closed wavy curve, faintly drawn -->
  <path class="curve" d="M 220 130 C 200 70 270 35 360 60 C 450 85 510 55 580 80 C 650 105 680 165 640 215 C 600 255 490 240 410 220 C 330 200 240 215 220 130 Z" />

  <!-- ε-balls (faint dashed circles) around three sample points -->
  <circle class="hair" cx="290" cy="64" r="34" />
  <circle class="hair" cx="500" cy="76" r="34" />
  <circle class="hair" cx="615" cy="170" r="34" />

  <!-- 2-simplices (filled triangles) where three samples are mutually within ε -->
  <polygon class="triangle" points="270,75 305,52 340,72" />
  <polygon class="triangle" points="465,75 500,60 530,86" />
  <polygon class="triangle" points="385,225 430,232 430,205" />

  <!-- 1-simplices (edges) -->
  <g class="ink">
    <line x1="252" y1="100" x2="270" y2="75" />
    <line x1="270" y1="75"  x2="305" y2="52" />
    <line x1="305" y1="52"  x2="340" y2="72" />
    <line x1="270" y1="75"  x2="340" y2="72" />
    <line x1="340" y1="72"  x2="385" y2="62" />
    <line x1="385" y1="62"  x2="430" y2="58" />
    <line x1="430" y1="58"  x2="465" y2="75" />
    <line x1="465" y1="75"  x2="500" y2="60" />
    <line x1="500" y1="60"  x2="530" y2="86" />
    <line x1="465" y1="75"  x2="530" y2="86" />
    <line x1="530" y1="86"  x2="570" y2="105" />
    <line x1="570" y1="105" x2="610" y2="130" />
    <line x1="610" y1="130" x2="640" y2="170" />
    <line x1="640" y1="170" x2="615" y2="208" />
    <line x1="615" y1="208" x2="565" y2="232" />
    <line x1="565" y1="232" x2="500" y2="232" />
    <line x1="500" y1="232" x2="430" y2="218" />
    <line x1="430" y1="218" x2="430" y2="232" />
    <line x1="430" y1="218" x2="385" y2="225" />
    <line x1="385" y1="225" x2="430" y2="232" />
    <line x1="385" y1="225" x2="320" y2="215" />
    <line x1="320" y1="215" x2="252" y2="190" />
    <line x1="252" y1="190" x2="220" y2="148" />
    <line x1="220" y1="148" x2="252" y2="100" />
  </g>

  <!-- 0-simplices (sample points) -->
  <g class="vertex">
    <circle cx="252" cy="100" r="3" />
    <circle cx="270" cy="75"  r="3" />
    <circle cx="305" cy="52"  r="3" />
    <circle cx="340" cy="72"  r="3" />
    <circle cx="385" cy="62"  r="3" />
    <circle cx="430" cy="58"  r="3" />
    <circle cx="465" cy="75"  r="3" />
    <circle cx="500" cy="60"  r="3" />
    <circle cx="530" cy="86"  r="3" />
    <circle cx="570" cy="105" r="3" />
    <circle cx="610" cy="130" r="3" />
    <circle cx="640" cy="170" r="3" />
    <circle cx="615" cy="208" r="3" />
    <circle cx="565" cy="232" r="3" />
    <circle cx="500" cy="232" r="3" />
    <circle cx="430" cy="218" r="3" />
    <circle cx="430" cy="232" r="3" />
    <circle cx="385" cy="225" r="3" />
    <circle cx="320" cy="215" r="3" />
    <circle cx="252" cy="190" r="3" />
    <circle cx="220" cy="148" r="3" />
  </g>

  <!-- annotations -->
  <text class="label"        x="172" y="88">M</text>
  <text class="label-small"  x="320" y="34" text-anchor="middle">&#x3B5;</text>
  <text class="label-small"  x="688" y="148" text-anchor="middle">&#x3B5;-ball</text>
  <line class="ink" stroke-width="0.5" opacity="0.55" x1="660" y1="148" x2="638" y2="160" />
  <text class="label"        x="730" y="56" text-anchor="middle">VR<tspan font-size="10">&#x3B5;</tspan>(P)</text>

  <!-- inscriptions in plate corners -->
  <text class="panel-label" x="20"  y="262">SAMPLING · RIPS · RECONSTRUCTION</text>
  <text class="panel-label" x="780" y="262" text-anchor="end">Frontispiece</text>
</svg>
