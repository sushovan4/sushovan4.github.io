# Dispatches from the Field—newspaper-style short notes that appear on the
# homepage between Research and Recent Papers. Edit this file to add, remove,
# or reorder dispatches; the homepage will pick up changes on the next render.
#
# Required:
#   place—the dateline (city, venue, or label)
#   date —for sort order; newest renders first
#
# Then either:
#   text —a plain-text dispatch (no inline links)
